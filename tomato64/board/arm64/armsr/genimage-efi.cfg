image efi-part.vfat {
	vfat {
		label = "boot"
		file EFI {
			image = "efi-part/EFI"
		}
	}

	size = 10M # 10MB
}

image tomato64.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition boot {
		image = "efi-part.vfat"
		partition-type-uuid = U
		offset = 32K
		bootable = true
	}

	partition root {
		partition-type-uuid = 0FC63DAF-8483-4772-8E79-3D69D8477DE4
		partition-uuid = UUID_TMP
		image = "rootfs.ext2"
	}
}
